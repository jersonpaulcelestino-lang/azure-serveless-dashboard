<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Azure Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-primary">Azure Serverless Dashboard</h1>

            <button class="btn btn-success mt-3" onclick="loadData()">Load Transactions</button>
            
            <div class="mt-4">
                <input type="text" id="status" class="form-control mb-2" placeholder="Transaction status">
                <input type="number" id="amount" class="form-control mb-2" placeholder="Transaction amount">
                <button class="btn btn-primary"  onclick="createTransaction()">Create Transaction</button> 
            </div>

            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h5>Total Transactions</h5>
                        <h2 id="totalTransactions">0</h2>
                    </div>
                </div>
            
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h5>Successful</h5>
                        <h2 id="successTransactions">0</h2>
                    </div>
                </div>
            
                <div class="col-md-4">
                    <div class="card p-3 shadow">
                        <h5>Failed</h5>
                        <h2 id="failedTransactions">0</h2>
                    </div>
                </div>
            
            </div>


            <table class="table mt-4">

                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Amount</th>
                    </tr>
                </thead>

                <tbody id="result">
                </tbody>

            </table>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
